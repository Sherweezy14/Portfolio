<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" role="img" aria-label="Transparent comic radial speed lines overlay">
  <defs>
    <filter id="roughen" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="fade" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="45%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <g filter="url(#roughen)" fill="#050505" opacity="0.92">
  

    <!-- right burst lines -->
    <path d="M1600 60 L1040 208 L1600 105 Z"/>
    <path d="M1600 155 L1065 235 L1600 180 Z" opacity=".85"/>
    <path d="M1600 225 L1015 253 L1600 250 Z"/>
    <path d="M1600 302 L1030 282 L1600 340 Z"/>
    <path d="M1600 435 L1005 318 L1600 490 Z" opacity=".9"/>
    <path d="M1430 8 L975 198 L1380 20 Z" opacity=".8"/>
    <path d="M1280 0 L920 185 L1230 12 Z"/>
    <path d="M1180 520 L905 337 L1130 520 Z"/>
    <path d="M1335 520 L965 322 L1280 520 Z" opacity=".75"/>
    <path d="M1600 10 L980 210 L1600 32 Z" opacity=".55"/>
    <path d="M1600 500 L960 330 L1600 520 Z" opacity=".55"/>


   </g>

  <!-- ink specks -->
  <g fill="#050505" opacity="0.75">
    <circle cx="340" cy="115" r="4"/><circle cx="420" cy="180" r="3"/><circle cx="505" cy="245" r="2"/>
    <circle cx="625" cy="118" r="3"/><circle cx="690" cy="85" r="2"/><circle cx="760" cy="146" r="2.5"/>
    <circle cx="840" cy="103" r="3"/><circle cx="920" cy="130" r="2"/><circle cx="1030" cy="185" r="3"/>
    <circle cx="1160" cy="115" r="4"/><circle cx="1240" cy="205" r="2.5"/><circle cx="1325" cy="315" r="3"/>
    <circle cx="405" cy="330" r="3"/><circle cx="545" cy="385" r="2.5"/><circle cx="720" cy="430" r="3"/>
    <circle cx="895" cy="398" r="2.5"/><circle cx="1035" cy="350" r="3"/><circle cx="1185" cy="390" r="2"/>
    <circle cx="270" cy="262" r="3"/><circle cx="1470" cy="262" r="3"/>
  </g>

  <!-- subtle transparent gray edge fade; remove if you want pure black-only artwork -->
  <rect width="1600" height="520" fill="url(#fade)" opacity="0.18"/>
</svg>
