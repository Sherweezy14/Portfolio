<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blastCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9B8"/>
      <stop offset="38%" stop-color="#FFE735"/>
      <stop offset="72%" stop-color="#FF9D00"/>
      <stop offset="100%" stop-color="#FF2D00"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="48%" stop-color="#FFF35A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 0.45  0 0 1 0 0  0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="halftone" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4" fill="#fff" opacity="0.42"/>
      <circle cx="21" cy="21" r="3" fill="#fff" opacity="0.25"/>
    </pattern>
  </defs>

